name: Push PR Workflow

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "src/**"
  pull_request:
    branches:
      - main
      - "release/**"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm test
