name: Push PR Workflow

on:
  push:
    branches:
      - main
      - "release/**"

  pull_request:
    branches:
      - main
      - "release/**"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test
